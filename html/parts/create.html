<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易掲示板</title>
    <link rel="stylesheet" href="../../css/parts/create.css">
    <link rel="stylesheet" href="../../css/parts/light-mode.css">
    <link rel="stylesheet" href="../../css/parts/dark-mode.css">
  </head>
  <body>
    <header>
      <h1>簡易掲示板</h1>
      <nav>
        <a href="../../html/list.html" id="show-link">投稿一覧</a>
        <input type="submit" id="mode-button" value="ダークモード">
      </nav>
    </header>
    <div id="form-error-message"></div>
    <form id="post-form">
      <label for="display-name">名前：<input type="text" id="display-name" class="hidden" placeholder="名前を入力してください"></label><br>
      <textarea id="display-post" placeholder="投稿してみよう" rows="4" cols="50"></textarea><br>
      <input type="submit" id="post-submit" value="投稿">
    </form>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="module" src="../../js/parts/create.js"></script>
    <script type="module" src="../../js/parts/mode-toggler.js"></script>
  </body>
</html>
